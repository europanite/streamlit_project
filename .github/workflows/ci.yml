name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build

      - name: Prepare report dir
        run: mkdir -p service/reports/ci

      - name: Run tests with coverage
        run: |
          docker compose -f docker-compose.test.yml run --rm --entrypoint /bin/sh service_test -lc '
            python -m coverage run -m pytest &&
            python -m coverage xml -o /reports/ci/coverage.xml
          '

      - name: Upload coverage xml
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: service/reports/ci/coverage.xml
          if-no-files-found: error

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
